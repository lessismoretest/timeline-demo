  function marketSeriesMarkup(series){
    const points = [...series.points].sort((left, right) => left.date.localeCompare(right.date));
    if(!points.length) return document.createElement('div');
    const minValue = Math.min(...points.map((point) => Number(point.value)));
    const maxValue = Math.max(...points.map((point) => Number(point.value)));
    const startMs = new Date(`${points[0].date}T00:00:00`).getTime();
    const endMs = new Date(`${points[points.length - 1].date}T00:00:00`).getTime();
    const duration = Math.max(endMs - startMs, 1);
    const valueSpan = Math.max(maxValue - minValue, 1);
    const polyline = points.map((point) => {
      const x = ((new Date(`${point.date}T00:00:00`).getTime() - startMs) / duration) * 100;
      const y = 72 - (((Number(point.value) - minValue) / valueSpan) * 56);
      return `${x.toFixed(2)},${y.toFixed(2)}`;
    }).join(' ');
    const trackMeta = getTrackMeta(series.track || 'general');
    const latest = points[points.length - 1];
    const wrap = document.createElement('div');
    wrap.className = 'market-series';
    wrap.innerHTML = `
      <svg class="market-series-svg" viewBox="0 0 100 78" preserveAspectRatio="none" aria-hidden="true">
        <polyline class="market-series-base" points="0,72 100,72"></polyline>
        <polyline class="market-series-line" points="${polyline}" style="stroke:${series.lineColor || trackMeta.color}"></polyline>
      </svg>
      <span class="market-series-label"></span>
      <span class="market-series-meta"></span>
      <span class="market-series-last"></span>
    `;
    wrap.querySelector('.market-series-label').textContent = `${series.label} · ${series.source || ''}`;
    wrap.querySelector('.market-series-meta').textContent = `${points[0].date} ~ ${latest.date}`;
    wrap.querySelector('.market-series-last').textContent = `最新 ${latest.value}`;
    return wrap;
  }

  function buildItems(){
    const filtered = filteredEvents();
    const filterStartDate = parseDateInput(filterStart.value, 'start');
    const filterEndDate = parseDateInput(filterEnd.value, 'end');
    if(currentPerspectiveMode === 'none'){
      return new vis.DataSet(
        filtered.map((e) => ({
          id: `${e.id}-none`,
          sourceId: e.id,
          start: e.start,
          end: itemDisplayEnd(e),
          title: tooltipText(e, e.pest?.[0] || 'S'),
          content: nodeContentMarkup(e)
        }))
      );
    }
    if(currentPerspectiveMode === 'track'){
      const seriesItems = marketSeriesEntries()
        .map(([seriesId, series]) => {
          const trackId = series.track || 'general';
          if(!eventMatchesSelectedTracks(trackId)) return null;
          if(activeGroupOnly && !trackMatchesScope(trackId, activeGroupOnly)) return null;
          const points = [...series.points]
            .sort((left, right) => left.date.localeCompare(right.date))
            .filter((point) => {
              const pointStart = startOfDay(`${point.date}T00:00:00`);
              const pointEnd = endOfDay(`${point.date}T00:00:00`);
              return itemRangeIntersects(pointStart, pointEnd, filterStartDate, filterEndDate);
            });
          const start = points[0]?.date;
          const end = points[points.length - 1]?.date;
          if(!start || !end) return null;
          const displayEnd = points.length > 1 ? end : addDays(start, 1);
          return {
            id: `series-${seriesId}`,
            seriesId,
            group: trackId,
            start,
            end: displayEnd,
            type: 'range',
            className: 'market-series-item',
            title: `${series.label} · ${series.source || ''}`,
            content: marketSeriesMarkup({
              ...series,
              points
            })
          };
        })
        .filter(Boolean);
      const eventItems = filtered
          .map((e) => {
            const trackId = e.track || 'general';
            if(activeGroupOnly && !trackMatchesScope(trackId, activeGroupOnly)) return null;
            return {
              id: `${e.id}-track`,
              sourceId: e.id,
              group: trackId,
              start: e.start,
              end: itemDisplayEnd(e),
              style: itemStyleForGroup(trackId),
              title: tooltipText(e, trackId),
              content: nodeContentMarkup(e)
            };
          })
          .filter(Boolean);
      return new vis.DataSet([...seriesItems, ...eventItems]);
    }
    const sel = selectedPEST();
    return new vis.DataSet(
      filtered.flatMap((e) =>
        e.pest
          .filter((pest) => sel.includes(pest) && (!activeGroupOnly || pest === activeGroupOnly))
          .map((pest) => ({
            id: `${e.id}-${pest}`,
            sourceId: e.id,
            group: pest,
            start: e.start,
            end: itemDisplayEnd(e),
            className: `pest-${pest}`,
            title: tooltipText(e, pest),
            content: nodeContentMarkup(e)
          }))
      )
    );
  }

  function applyRange(years){
    if(years === 'all'){
      filterStart.value = '';
      filterEnd.value = '';
      setQuickRangeActive('all');
      render();
      return;
    }
    const today = new Date();
    const start = new Date(today);
    if (String(years) === '0.5') {
      start.setMonth(today.getMonth() - 6);
    } else {
      start.setFullYear(today.getFullYear() - Number(years));
    }
    filterStart.value = dateToString(start);
    filterEnd.value = dateToString(today);
    setQuickRangeActive(String(years));
    render();
  }

  window.handleLaneFilterDoubleClick = function(event, kind, id){
    const target = event?.target;
    if(target instanceof HTMLElement && target.closest('.lane-color-input')) return false;
    event?.preventDefault?.();
    event?.stopPropagation?.();
    window.setTimeout(() => {
      if(kind === 'pest'){
        const selected = selectedPEST();
        if(selected.length === 1 && selected[0] === id){
          setAllPEST(true);
          render();
          return;
        }
        isolatePestFilter(id);
        return;
      }
      if(kind === 'track'){
        const selected = selectedTracks();
        if(selected.length === 1 && selected[0] === id){
          setAllTracks(true);
          render();
          return;
        }
        isolateTrackFilter(id);
      }
    }, 0);
    return false;
  };

    });
    let payload = null;

  async function saveEditModal(){
    const isCreateMode = editingId == null;
    const previous = isCreateMode ? JSON.parse(JSON.stringify(raw)) : null;
    const ev = isCreateMode
      ? {
          id: nextEventId(),
          start: '',
          end: '',
          title: '',
          category: '',
          keywords: [],
          description: '',
          logo: '',
          favorite: false,
          favoriteFolders: [],
          track: 'general',
          primaryTrack: 'general',
          tracks: ['general'],
          primaryModality: 'unknown',
          modalities: ['unknown'],
          classifications: {
            track: { primary: 'general', all: ['general'] },
            modality: { primary: 'unknown', all: ['unknown'] }
          },
          pest: ['S']
        }
      : raw.find(x=>x.id===editingId);
    if(!ev) return;
    const existing = isCreateMode ? null : JSON.parse(JSON.stringify(ev));
    ev.start = (fStart.value || '').trim();
    ev.end = (fEnd.value || '').trim() || ev.start;
    ev.logo = (fLogo.value || '').trim();
    ev.title = (fTitle.value || '').trim();
    ev.keywords = (fKeywords.value || '').split(',').map(s=>s.trim()).filter(Boolean);
    ev.category = (fCategory.value || '').trim();
    ev.primaryTrack = fTrack.value || 'general';
    ev.track = ev.primaryTrack;
    ev.tracks = [ev.primaryTrack];
    ev.primaryModality = normalizeModalityId(fPrimaryModality.value || 'unknown') || 'unknown';
    ev.modalities = [ev.primaryModality];
    ev.classifications = {
      track: {
        primary: ev.primaryTrack,
        all: ev.tracks
      },
      modality: {
        primary: ev.primaryModality,
        all: ev.modalities
      }
    };
    ev.pest = (fPEST.value || '').split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);
    ev.description = (fDesc.value || '').trim();
    ev.favorite = selectedFavoriteFolders().length > 0;
    ev.favoriteFolders = selectedFavoriteFolders();
    if(isCreateMode){
      raw.push(ev);
    }
    setSaveStatus('正在保存…', '');
    saveEditBtn.disabled = true;
    try{
      await persistTimeline();
      render();
      setSaveStatus('已自动保存到 timeline.json', 'success');
      setTimeout(() => closeEditModal(), 300);
    } catch (error){
      if(isCreateMode){
        raw = previous;
      } else {
        Object.assign(ev, existing);
      }
      render();
      setSaveStatus(`保存失败：${error.message}`, 'error');
    } finally {
      saveEditBtn.disabled = false;
    }
  }

  async function downloadCanvasAsPng(canvas, filename){
    const blob = await new Promise((resolve, reject) => {
      canvas.toBlob((result) => {
        if(result){
          resolve(result);
        } else {
          reject(new Error('PNG 编码失败'));
        }
      }, 'image/png');
    });
    const href = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = href;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.setTimeout(() => URL.revokeObjectURL(href), 1000);
  }

  function trimCanvasWhitespace(canvas, threshold = 245){
    const ctx = canvas.getContext('2d');
    const { width, height } = canvas;
    const imageData = ctx.getImageData(0, 0, width, height).data;
    let minX = width;
    let minY = height;
    let maxX = -1;
    let maxY = -1;
    for(let y = 0; y < height; y += 1){
      for(let x = 0; x < width; x += 1){
        const index = (y * width + x) * 4;
        const r = imageData[index];
        const g = imageData[index + 1];
        const b = imageData[index + 2];
        const a = imageData[index + 3];
        if(a === 0) continue;
        if(r >= threshold && g >= threshold && b >= threshold) continue;
        if(x < minX) minX = x;
        if(y < minY) minY = y;
        if(x > maxX) maxX = x;
        if(y > maxY) maxY = y;
      }
    }
    if(maxX < 0 || maxY < 0){
      return canvas;
    }
    const padding = 36;
    minX = Math.max(0, minX - padding);
    minY = Math.max(0, minY - padding);
    maxX = Math.min(width - 1, maxX + padding);
    maxY = Math.min(height - 1, maxY + padding);
    const trimmed = document.createElement('canvas');
    trimmed.width = maxX - minX + 1;
    trimmed.height = maxY - minY + 1;
    trimmed.getContext('2d').drawImage(
      canvas,
      minX, minY, trimmed.width, trimmed.height,
      0, 0, trimmed.width, trimmed.height
    );
    return trimmed;
  }

  async function exportImage(){
    const button = document.getElementById('exportImageBtn');
    const host = document.getElementById('timeline');
    const target = host?.querySelector('.vis-timeline') || host;
    if(typeof window.html2canvas !== 'function'){
      alert('导出图片功能加载失败，请刷新页面后重试');
      return;
    }
    if(!target || container.hidden){
      alert('时间轴尚未加载完成，暂时无法导出图片');
      return;
    }
    const previousText = button.textContent;
    button.disabled = true;
    button.textContent = '导出中…';
    try{
      const canvas = await window.html2canvas(target, {
        backgroundColor: '#ffffff',
        scale: Math.min(window.devicePixelRatio || 2, 2),
        useCORS: true,
        logging: false,
        width: Math.ceil(target.scrollWidth || target.clientWidth || target.offsetWidth),
        height: Math.ceil(target.scrollHeight || target.clientHeight || target.offsetHeight)
      });
      const timestamp = new Date().toISOString().replace(/[:T]/g, '-').slice(0, 16);
      await downloadCanvasAsPng(canvas, `timeline-${timestamp}.png`);
    } catch (error){
      alert(`导出图片失败：${error.message || error}`);
    } finally {
      button.disabled = false;
      button.textContent = previousText;
    }
  }

  function syncTimelineHeight(){
    const root = container.querySelector('.vis-timeline');
    if(!root) return;
    const totalHeight = Math.max(
      Math.ceil(root.scrollHeight || 0),
      Math.ceil(root.getBoundingClientRect().height || 0),
      160
    );
    container.style.height = `${totalHeight}px`;
  }

  function queueTimelineHeightSync(){
    requestAnimationFrame(() => {
      syncTimelineHeight();
      requestAnimationFrame(syncTimelineHeight);
    });
  }

  // Custom Time Marker Functions
  function addCustomTimeMarker(dateStr){
    if(!dateStr) return null;
    const id = `marker-${nextMarkerId++}`;
    const marker = { id, date: dateStr };
    customTimeMarkers.push(marker);
    if(timeline){
      try{
        timeline.addCustomTime(new Date(dateStr), id);
      }catch(e){
        console.warn('Failed to add custom time:', e);
      }
    }
    renderCustomTimeMarkers();
    return marker;
  }

  function removeCustomTimeMarker(id){
    const index = customTimeMarkers.findIndex(m => m.id === id);
    if(index > -1){
      customTimeMarkers.splice(index, 1);
      if(timeline){
        try{
          timeline.removeCustomTime(id);
        }catch(e){
          console.warn('Failed to remove custom time:', e);
        }
      }
      renderCustomTimeMarkers();
    }
  }

  function renderCustomTimeMarkers(){
    if(!timeline) return;
    
    // Clear existing custom times and re-add all markers
    customTimeMarkers.forEach(marker => {
      try{
        // Remove first to avoid duplicates
        timeline.removeCustomTime(marker.id);
        timeline.addCustomTime(new Date(marker.date), marker.id);
      }catch(e){
        // Ignore errors when re-adding
      }
    });
    
    // Add labels to custom time elements after a short delay
    setTimeout(() => {
      const customTimeBars = container.querySelectorAll('.vis-custom-time');
      customTimeBars.forEach(bar => {
        if(!bar.dataset.markerLabelAdded){
          bar.dataset.markerLabelAdded = 'true';
          const markerId = bar.className.match(/vis-custom-time-(\S+)/)?.[1];
          const marker = customTimeMarkers.find(m => m.id === markerId);
          if(marker && !bar.querySelector('.custom-time-label')){
            const label = document.createElement('div');
            label.className = 'custom-time-label';
            label.textContent = marker.date;
            bar.appendChild(label);
            
            // Double-click to delete
            bar.addEventListener('dblclick', (e) => {
              e.stopPropagation();
              if(confirm(`确定要删除 ${marker.date} 的标记吗？`)){
                removeCustomTimeMarker(marker.id);
              }
            });
          }
        }
      });
    }, 200);
  }

  function render(){
    const events = filteredEvents();
    if (currentViewMode === 'list') {
      container.hidden = true;
      trendViewEl.classList.remove('active');
      sCurveViewEl.classList.remove('active');
      listViewEl.classList.add('active');
      renderListView();
      renderPestFilters();
      renderTrackFilters();
      renderFavoriteFolderFilter();
      return;
    } else if (currentViewMode === 'trend') {
      container.hidden = true;
      listViewEl.classList.remove('active');
      trendViewEl.classList.add('active');
      sCurveViewEl.classList.remove('active');
      renderPestFilters();
      renderTrackFilters();
      renderFavoriteFolderFilter();
      renderTrendView();
      return;
    } else if (currentViewMode === 's-curve') {
      container.hidden = true;
      listViewEl.classList.remove('active');
      trendViewEl.classList.remove('active');
      sCurveViewEl.classList.add('active');
      renderPestFilters();
      renderTrackFilters();
      renderFavoriteFolderFilter();
      renderSCurveShowcase(sCurveStandaloneEl, events, 'full');
      return;
    } else {
      container.hidden = false;
      listViewEl.classList.remove('active');
      trendViewEl.classList.remove('active');
      sCurveViewEl.classList.remove('active');
    }
    
    renderPestFilters();
    renderTrackFilters();
    renderFavoriteFolderFilter();
    const items = buildItems();
    currentItems = items;
    const usesGroups = currentPerspectiveMode !== 'none';
    const groups = currentPerspectiveMode === 'pest'
      ? buildPestGroups()
      : currentPerspectiveMode === 'track'
        ? buildTrackGroups(selectedTracks())
        : null;
    
    if(timeline && timelineUsesGroups !== usesGroups){
      timeline.destroy();
      timeline = null;
    }
    timelineUsesGroups = usesGroups;
    if(!timeline){
      timeline = usesGroups
        ? new vis.Timeline(container, items, groups, options)
        : new vis.Timeline(container, items, options);
      timeline.on('changed', queueTimelineHeightSync);
      timeline.on('rangechanged', queueTimelineHeightSync);
      timeline.on('select', (props)=>{
        selectedItemId = props.items?.[0] || null;
        selectedSourceId = selectedItemId ? currentItems.get(selectedItemId)?.sourceId || null : null;
      });
      timeline.on('doubleClick', (props) => {
        // Handle custom time marker
        if(props.customTime){
          const markerId = props.customTime;
          if(confirm(`确定要删除这个时间标记吗？`)){
            removeCustomTimeMarker(markerId);
          }
          return;
        }
        if(props.group && !props.item){
          toggleGroupFocus(props.group);
          return;
        }
        // Double-click on empty space adds custom time marker
        if(!props.item && props.time){
          // Get the time from the click position
          const date = props.time;
          if(date){
            const dateStr = typeof date === 'string' ? date.slice(0, 10) : date.toISOString().slice(0, 10);
            addCustomTimeMarker(dateStr);
          }
          return;
        }
        if(!props.item) return;
        const item = currentItems.get(props.item);
        if(item?.seriesId) return;
        if(item?.sourceId) openEditModal(item.sourceId);
      });
    } else {
      timeline.setItems(items);
      if(usesGroups){
        timeline.setGroups(groups);
      }
      if(selectedSourceId){
        const match = items.get().find(item => item.sourceId === selectedSourceId);
        selectedItemId = match?.id || null;
      } else {
        selectedItemId = null;
      }
    }
    if(selectedItemId){ timeline.setSelection([selectedItemId], {focus:false}); }
    timeline.fit();
    queueTimelineHeightSync();
    renderCustomTimeMarkers();
  }

  window.addEventListener('resize', () => {
    if (trendChart && currentViewMode === 'trend') {
      trendChart.resize();
    }
  });

  pestFilters.addEventListener('change', (event) => {
    if(!(event.target instanceof HTMLInputElement)) return;
    if(event.target.classList.contains('pest-filter')){
      activeGroupOnly = null;
      syncSelectAllLabel();
      persistFilterState();
      render();
      return;
    }
    if(event.target.classList.contains('lane-color-input') && event.target.dataset.scope === 'pest'){

      trackFilterSearch.focus();
      trackFilterSearch.select();

  trackFilterSearch.addEventListener('input', () => {

  trackFilterParents.addEventListener('click', (event) => {
    if(event.target instanceof HTMLElement && event.target.closest('.lane-color-input')) return;
    const renameBtn = event.target.closest('[data-rename-track]');
    if(renameBtn){
      renameTrack(renameBtn.dataset.renameTrack);
      return;
    }
    const deleteBtn = event.target.closest('[data-delete-track]');
    if(deleteBtn){
      deleteTrackAndReassign(deleteBtn.dataset.deleteTrack);
      return;
    }
    const option = event.target.closest('[data-parent-id]');
    if(option && !(event.target instanceof HTMLInputElement)){
      currentTrackCascadeParentId = option.dataset.parentId;
      renderTrackFilters();
      return;
    }
    if(event.target instanceof HTMLInputElement && event.target.classList.contains('track-filter')){
      activeGroupOnly = null;
      toggleTrackScopeSelection(event.target.dataset.track, event.target.checked);
      renderTrackFilters();
      persistFilterState();
      render();
    }
  });
  trackFilterParents.addEventListener('input', (event) => {
    if(!(event.target instanceof HTMLInputElement) || !event.target.classList.contains('lane-color-input')) return;
    updateTrackColor(event.target.dataset.id, event.target.value);
    render();
    queueLaneColorPersist();
  });
  trackFilterChildren.addEventListener('click', (event) => {
    if(event.target instanceof HTMLElement && event.target.closest('.lane-color-input')) return;
    const renameBtn = event.target.closest('[data-rename-track], [data-action="rename-track"]');
    if(renameBtn){
      renameTrack(renameBtn.dataset.renameTrack || renameBtn.dataset.trackId);
      return;
    }
    const deleteBtn = event.target.closest('[data-delete-track], [data-action="delete-track"]');
    if(deleteBtn){
      deleteTrackAndReassign(deleteBtn.dataset.deleteTrack || deleteBtn.dataset.trackId);
      return;
    }
    const parentOnlyBtn = event.target.closest('[data-action="parent-only"]');
    if(parentOnlyBtn){
      activeGroupOnly = null;
      activeTrackFilters = new Set(findDescendantTracks(parentOnlyBtn.dataset.parentId));
      renderTrackFilters();
      persistFilterState();
      render();
      return;
    }
  });
  trackFilterChildren.addEventListener('change', (event) => {
    if(!(event.target instanceof HTMLInputElement) || !event.target.classList.contains('track-filter')) return;
    activeGroupOnly = null;
    const trackId = event.target.dataset.track;
    if(trackId){
      if(event.target.checked){
        activeTrackFilters.add(trackId);
      } else {
        activeTrackFilters.delete(trackId);
      }
    }
    renderTrackFilters();
    persistFilterState();
    render();
  });
  trackFilterChildren.addEventListener('input', (event) => {
    if(!(event.target instanceof HTMLInputElement) || !event.target.classList.contains('lane-color-input')) return;
    updateTrackColor(event.target.dataset.id, event.target.value);
    render();
    queueLaneColorPersist();
  });
  trackFilterSummary.addEventListener('click', (event) => {
    const removeBtn = event.target.closest('[data-remove-track]');
    if(!removeBtn) return;
    activeGroupOnly = null;
    activeTrackFilters.delete(removeBtn.dataset.removeTrack);
    renderTrackFilters();
    persistFilterState();
    render();
  });
  selectAllBtn.addEventListener('click', ()=>{
    if(currentPerspectiveMode !== 'pest') return;
    const allChecked = Array.from(pestFilters.querySelectorAll('.pest-filter')).every((input) => input.checked);
    activeGroupOnly = null;
    setAllPEST(!allChecked);
    persistFilterState();
    render();
  });
  selectAllTrackBtn.addEventListener('click', ()=>{
    if(currentPerspectiveMode !== 'track') return;
    const groupIds = trackGroupIds();
    const allChecked = groupIds.length > 0 && groupIds.every((trackId) => activeTrackFilters.has(trackId));
    activeGroupOnly = null;
    setAllTracks(!allChecked);
    persistFilterState();
    render();
  });
  clearTrackBtn.addEventListener('click', () => {
    if(currentPerspectiveMode !== 'track') return;
    activeGroupOnly = null;
    setAllTracks(false);
    persistFilterState();
    render();
  });
  perspectiveButtons.forEach((button) => {
    button.addEventListener('click', ()=>{
      setPerspectiveMode(button.dataset.mode);
      persistFilterState();
      render();
    });
  });
  document.getElementById('applyDateBtn').addEventListener('click', ()=>{
    clearQuickRangeSelection();
    persistFilterState();
    render();
  });
  [filterStart, filterEnd].forEach((input) => {
    input.addEventListener('change', () => {
      clearQuickRangeSelection();
      persistFilterState();
    });
  });
  searchInput.addEventListener('input', ()=>{
    syncClearSearchButton();
    persistFilterState();
    render();
  });
  clearSearchBtn.addEventListener('click', ()=>{
    searchInput.value = '';
    syncClearSearchButton();
    favoriteFolderPills.dataset.folders = '';
    persistFilterState();
    render();
  });
  favoriteFolderPills.addEventListener('click', (event) => {
    const pill = event.target.closest('.favorite-folder-pill');
    if(!pill) return;
    const folder = pill.dataset.folder;
    if(!folder){
      favoriteFolderPills.dataset.folders = '';
    }else{
      const current = (favoriteFolderPills.dataset.folders || '').split(',').filter(Boolean);
      if(current.includes(folder)){
        favoriteFolderPills.dataset.folders = current.filter(f => f !== folder).join(',');
      }else{
        favoriteFolderPills.dataset.folders = [...current, folder].join(',');
      }
    }
    persistFilterState();
    render();
  });
  window.addEventListener('resize', queueTimelineHeightSync);
  toggleFavoriteBtn.addEventListener('click', (event)=>{
    event.stopPropagation();
    toggleFavoritePopover();
  });
  favoriteFolderList.addEventListener('change', (event) => {
    if(!(event.target instanceof HTMLInputElement) || event.target.name !== 'favoriteFolderChoice') return;
    syncFavoriteControls();
  });
  addFavoriteFolderBtn.addEventListener('click', ()=>{
    const folder = ensureFavoriteFolderExists(newFavoriteFolderInput.value);
    if(!folder) return;
    newFavoriteFolderInput.value = '';
    setFavoriteFolderSelection(folder);
  });
  newFavoriteFolderInput.addEventListener('keydown', (event) => {

      persistFilterState();

  document.getElementById('createEventBtn').addEventListener('click', openCreateModal);
  document.getElementById('addMarkerBtn').addEventListener('click', () => {
    const dateStr = prompt('请输入日期（YYYY-MM-DD）:', new Date().toISOString().slice(0, 10));

    }

  setPerspectiveMode('track');
  syncSelectAllLabel();
  syncClearSearchButton();
  setTimeDisplayMode('range');

  updateViewModeUI();

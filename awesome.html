  async function persistTimeline(){
    const response = await fetch('./save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildTimelinePayload())
    });
    let payload = null;
    try{
      payload = await response.json();
    } catch (_) {}
    if(!response.ok || !payload?.ok){
      throw new Error(payload?.error || `HTTP ${response.status}`);
    }
  }

  async function saveEditModal(){
    const isCreateMode = editingId == null;
    const previous = isCreateMode ? JSON.parse(JSON.stringify(raw)) : null;
    const ev = isCreateMode
      ? {
          id: nextEventId(),
          start: '',
          end: '',
          title: '',
          category: '',
          keywords: [],
          description: '',
          logo: '',
          favorite: false,
          favoriteFolders: [],
          track: 'general',
          pest: ['S']
        }
      : raw.find(x=>x.id===editingId);
    if(!ev) return;
    const existing = isCreateMode ? null : JSON.parse(JSON.stringify(ev));
    ev.start = (fStart.value || '').trim();
    ev.end = (fEnd.value || '').trim() || ev.start;
    ev.logo = (fLogo.value || '').trim();
    ev.title = (fTitle.value || '').trim();
    ev.keywords = (fKeywords.value || '').split(',').map(s=>s.trim()).filter(Boolean);
    ev.category = (fCategory.value || '').trim();
    ev.track = fTrack.value || 'general';
    ev.pest = (fPEST.value || '').split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);
    ev.description = (fDesc.value || '').trim();
    ev.favorite = selectedFavoriteFolders().length > 0;
    ev.favoriteFolders = selectedFavoriteFolders();
    if(isCreateMode){
      raw.push(ev);
    }
    setSaveStatus('正在保存…', '');
    saveEditBtn.disabled = true;
    try{
      await persistTimeline();
      render();
      setSaveStatus('已自动保存到 timeline.json', 'success');
      setTimeout(() => closeEditModal(), 300);
    } catch (error){
      if(isCreateMode){
        raw = previous;
      } else {
        Object.assign(ev, existing);
      }
      render();
      setSaveStatus(`保存失败：${error.message}`, 'error');
    } finally {
      saveEditBtn.disabled = false;
    }
  }

  async function deleteEditModal(){
    if(!editingId) return;
    const ev = raw.find(x => x.id === editingId);
    if(!ev) return;
    if(!pendingDeleteConfirm){
      pendingDeleteConfirm = true;
      deleteEditBtn.textContent = '确认删除';
      deleteEditBtn.classList.add('favorite-active');
      setSaveStatus(`再次点击删除「${ev.title}」`, '');
      return;
    }
    const previous = JSON.parse(JSON.stringify(raw));
    raw = raw.filter(x => x.id !== editingId);
    selectedItemId = null;
    selectedSourceId = null;
    activeGroupOnly = null;
    setSaveStatus('正在删除…', '');
    deleteEditBtn.disabled = true;
    saveEditBtn.disabled = true;
    try{
      await persistTimeline();
      render();
      setSaveStatus('已删除并保存到 timeline.json', 'success');
      setTimeout(() => closeEditModal(), 300);
    } catch (error){
      raw = previous;
      resetDeleteButtonState();
      render();
      setSaveStatus(`删除失败：${error.message}`, 'error');
    } finally {
      deleteEditBtn.disabled = false;
      saveEditBtn.disabled = false;
    }
  }

  function exportJson(){
    const blob = new Blob([JSON.stringify(buildTimelinePayload(), null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'timeline-edited.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function exportImage(){
    const button = document.getElementById('exportImageBtn');
    const host = document.getElementById('timeline');
    const target = host?.querySelector('.vis-timeline') || host;
    if(typeof window.html2canvas !== 'function'){
      alert('导出图片功能加载失败，请刷新页面后重试');
      return;
    }
    if(!target || container.hidden){
      alert('时间轴尚未加载完成，暂时无法导出图片');
      return;
    }
    const previousText = button.textContent;
    button.disabled = true;
    button.textContent = '导出中…';
    try{
      const canvas = await window.html2canvas(target, {
        backgroundColor: '#ffffff',
        scale: Math.min(window.devicePixelRatio || 2, 2),
        useCORS: true,
        logging: false,
        width: Math.ceil(target.scrollWidth || target.clientWidth || target.offsetWidth),
        height: Math.ceil(target.scrollHeight || target.clientHeight || target.offsetHeight)
      });
      const a = document.createElement('a');
      const timestamp = new Date().toISOString().replace(/[:T]/g, '-').slice(0, 16);
      a.href = canvas.toDataURL('image/png');
      a.download = `timeline-${timestamp}.png`;
      a.click();
    } catch (error){
      alert(`导出图片失败：${error.message || error}`);
    } finally {
      button.disabled = false;
      button.textContent = previousText;
    }
  }

  function syncTimelineHeight(){
    const root = container.querySelector('.vis-timeline');
    if(!root) return;
    const totalHeight = Math.max(
      Math.ceil(root.scrollHeight || 0),
      Math.ceil(root.getBoundingClientRect().height || 0),
      160
    );
    container.style.height = `${totalHeight}px`;
  }

  function queueTimelineHeightSync(){
    requestAnimationFrame(() => {
      syncTimelineHeight();
      requestAnimationFrame(syncTimelineHeight);
    });
  }

  // Custom Time Marker Functions
  function addCustomTimeMarker(dateStr){
    if(!dateStr) return null;
    const id = `marker-${nextMarkerId++}`;
    const marker = { id, date: dateStr };
    customTimeMarkers.push(marker);
    if(timeline){
      try{
        timeline.addCustomTime(new Date(dateStr), id);
      }catch(e){
        console.warn('Failed to add custom time:', e);
      }
    }
    renderCustomTimeMarkers();
    return marker;
  }

  function removeCustomTimeMarker(id){
    const index = customTimeMarkers.findIndex(m => m.id === id);
    if(index > -1){
      customTimeMarkers.splice(index, 1);
      if(timeline){
        try{
          timeline.removeCustomTime(id);
        }catch(e){
          console.warn('Failed to remove custom time:', e);
        }
      }
      renderCustomTimeMarkers();
    }
  }

  function renderCustomTimeMarkers(){
    if(!timeline) return;
    
    // Clear existing custom times and re-add all markers
    customTimeMarkers.forEach(marker => {
      try{
        // Remove first to avoid duplicates
        timeline.removeCustomTime(marker.id);
        timeline.addCustomTime(new Date(marker.date), marker.id);
      }catch(e){
        // Ignore errors when re-adding
      }
    });
    
    // Add labels to custom time elements after a short delay
    setTimeout(() => {
      const customTimeBars = container.querySelectorAll('.vis-custom-time');
      customTimeBars.forEach(bar => {
        if(!bar.dataset.markerLabelAdded){
          bar.dataset.markerLabelAdded = 'true';
          const markerId = bar.className.match(/vis-custom-time-(\S+)/)?.[1];
          const marker = customTimeMarkers.find(m => m.id === markerId);
          if(marker && !bar.querySelector('.custom-time-label')){
            const label = document.createElement('div');
            label.className = 'custom-time-label';
            label.textContent = marker.date;
            bar.appendChild(label);
            
            // Double-click to delete
            bar.addEventListener('dblclick', (e) => {
              e.stopPropagation();
              if(confirm(`确定要删除 ${marker.date} 的标记吗？`)){
                removeCustomTimeMarker(marker.id);
              }
            });
          }
        }
      });
    }, 200);
  }

  function render(){
    renderPestFilters();
    renderTrackFilters();
    renderFavoriteFolderFilter();
    const items = buildItems();
    currentItems = items;
    const usesGroups = currentPerspectiveMode !== 'none';
    const groups = currentPerspectiveMode === 'pest'
      ? buildPestGroups()
      : currentPerspectiveMode === 'track'
        ? buildTrackGroups()
        : null;
    
    if(timeline && timelineUsesGroups !== usesGroups){
      timeline.destroy();
      timeline = null;
    }
    timelineUsesGroups = usesGroups;
    if(!timeline){
      timeline = usesGroups
        ? new vis.Timeline(container, items, groups, options)
        : new vis.Timeline(container, items, options);
      timeline.on('changed', queueTimelineHeightSync);
      timeline.on('rangechanged', queueTimelineHeightSync);
      timeline.on('select', (props)=>{
        selectedItemId = props.items?.[0] || null;
        selectedSourceId = selectedItemId ? currentItems.get(selectedItemId)?.sourceId || null : null;
      });
      timeline.on('doubleClick', (props) => {
        // Handle custom time marker
        if(props.customTime){
          const markerId = props.customTime;
          if(confirm(`确定要删除这个时间标记吗？`)){
            removeCustomTimeMarker(markerId);
          }
          return;
        }
        if(props.group && !props.item){
          toggleGroupFocus(props.group);
          return;
        }
        // Double-click on empty space adds custom time marker
        if(!props.item && props.time){
          // Get the time from the click position
          const date = props.time;
          if(date){
            const dateStr = typeof date === 'string' ? date.slice(0, 10) : date.toISOString().slice(0, 10);
            addCustomTimeMarker(dateStr);
          }
          return;
        }
        if(!props.item) return;
        const item = currentItems.get(props.item);
        if(item?.seriesId) return;
        if(item?.sourceId) openEditModal(item.sourceId);
      });
    } else {
      timeline.setItems(items);
      if(usesGroups){
        timeline.setGroups(groups);
      }
      if(selectedSourceId){
        const match = items.get().find(item => item.sourceId === selectedSourceId);
        selectedItemId = match?.id || null;
      } else {
        selectedItemId = null;
      }
    }
    if(selectedItemId){ timeline.setSelection([selectedItemId], {focus:false}); }
    timeline.fit();
    queueTimelineHeightSync();
    renderCustomTimeMarkers();
  }

  pestFilters.addEventListener('change', (event) => {
    if(!(event.target instanceof HTMLInputElement)) return;
    if(event.target.classList.contains('pest-filter')){
      activeGroupOnly = null;
      syncSelectAllLabel();
      render();
      return;
    }
    if(event.target.classList.contains('lane-color-input') && event.target.dataset.scope === 'pest'){
      updatePestColor(event.target.dataset.id, event.target.value);
      render();
      queueLaneColorPersist();
    }
  });
  trackFilters.addEventListener('change', (event) => {
    if(!(event.target instanceof HTMLInputElement)) return;
    if(event.target.classList.contains('track-filter')){
      activeGroupOnly = null;
      activeTrackFilters = new Set(
        Array.from(trackFilters.querySelectorAll('.track-filter'))
          .filter((input) => input.checked)
          .map((input) => input.dataset.track)
      );
      syncSelectAllLabel();
      render();
      return;
    }
    if(event.target.classList.contains('lane-color-input') && event.target.dataset.scope === 'track'){
      updateTrackColor(event.target.dataset.id, event.target.value);
      render();
      queueLaneColorPersist();
    }
  });
  selectAllBtn.addEventListener('click', ()=>{
    if(currentPerspectiveMode !== 'pest') return;
    const allChecked = Array.from(pestFilters.querySelectorAll('.pest-filter')).every((input) => input.checked);
    activeGroupOnly = null;
    setAllPEST(!allChecked);
    render();
  });
  selectAllTrackBtn.addEventListener('click', ()=>{
    if(currentPerspectiveMode !== 'track') return;
    const allChecked = Array.from(trackFilters.querySelectorAll('.track-filter')).every((input) => input.checked);
    activeGroupOnly = null;
    setAllTracks(!allChecked);
    render();
  });
  perspectiveButtons.forEach((button) => {
    button.addEventListener('click', ()=>{
      setPerspectiveMode(button.dataset.mode);
      render();
    });
  });
  document.getElementById('applyDateBtn').addEventListener('click', ()=>{
    clearQuickRangeSelection();
    render();
  });
  [filterStart, filterEnd].forEach((input) => {
    input.addEventListener('change', clearQuickRangeSelection);
  });
  searchInput.addEventListener('input', ()=>{
    syncClearSearchButton();
    render();
  });
  clearSearchBtn.addEventListener('click', ()=>{
    searchInput.value = '';
    syncClearSearchButton();
    favoriteFolderPills.dataset.folders = '';
    render();
  });
  favoriteFolderPills.addEventListener('click', (event) => {
    const pill = event.target.closest('.favorite-folder-pill');
    if(!pill) return;
    const folder = pill.dataset.folder;
    if(!folder){
      favoriteFolderPills.dataset.folders = '';
    }else{
      const current = (favoriteFolderPills.dataset.folders || '').split(',').filter(Boolean);
      if(current.includes(folder)){
        favoriteFolderPills.dataset.folders = current.filter(f => f !== folder).join(',');
      }else{
        favoriteFolderPills.dataset.folders = [...current, folder].join(',');
      }
    }
    render();
  });
  window.addEventListener('resize', queueTimelineHeightSync);
  toggleFavoriteBtn.addEventListener('click', (event)=>{
    event.stopPropagation();
    toggleFavoritePopover();
  });
  favoriteFolderList.addEventListener('change', (event) => {
    if(!(event.target instanceof HTMLInputElement) || event.target.name !== 'favoriteFolderChoice') return;
    syncFavoriteControls();
  });
  addFavoriteFolderBtn.addEventListener('click', ()=>{
    const folder = ensureFavoriteFolderExists(newFavoriteFolderInput.value);
    if(!folder) return;
    newFavoriteFolderInput.value = '';
    setFavoriteFolderSelection(folder);
  });
  newFavoriteFolderInput.addEventListener('keydown', (event) => {
    if(event.key !== 'Enter') return;
    event.preventDefault();
    addFavoriteFolderBtn.click();
  });
  renameFavoriteFolderBtn.addEventListener('click', () => {
    closeFavoritePopover();
    renameFavoriteFolder();
    persistTimeline();
  });
  deleteFavoriteFolderBtn.addEventListener('click', () => {
    closeFavoritePopover();
    deleteFavoriteFolder();
    persistTimeline();
  });
  timeDisplayButtons.forEach((button) => {
    button.addEventListener('click', ()=>{
      setTimeDisplayMode(button.dataset.mode);
      render();
    });
  });
  nodeDisplayButtons.forEach((button) => {
    button.addEventListener('click', ()=>{
      setNodeDisplayMode(button.dataset.mode);
      render();
    });
  });
  quickRangeButtons.forEach((button) => {
    button.addEventListener('click', ()=>{
      applyRange(button.dataset.range);
    });
  });
  document.getElementById('createEventBtn').addEventListener('click', openCreateModal);
  document.getElementById('addMarkerBtn').addEventListener('click', () => {
    const dateStr = prompt('请输入日期（YYYY-MM-DD）:', new Date().toISOString().slice(0, 10));
    if(dateStr && /^\d{4}-\d{2}-\d{2}$/.test(dateStr)){
      addCustomTimeMarker(dateStr);
    } else if(dateStr){
      alert('日期格式不正确，请使用 YYYY-MM-DD 格式');
    }
  });
  document.getElementById('exportImageBtn').addEventListener('click', exportImage);
  document.getElementById('exportBtn').addEventListener('click', exportJson);
  document.getElementById('cancelEdit').addEventListener('click', closeEditModal);
  saveEditBtn.addEventListener('click', saveEditModal);
  deleteEditBtn.addEventListener('click', deleteEditModal);
  modal.addEventListener('click', (e)=>{ if(e.target===modal) closeEditModal(); });
  document.addEventListener('click', (event) => {
    if(!favoritePopover.classList.contains('open')) return;
    if(event.target === toggleFavoriteBtn || favoritePopover.contains(event.target)) return;
    closeFavoritePopover();
  });
  fLogo.addEventListener('input', updateLogoPreview);
  logoFileInput.addEventListener('change', async (event) => {
    const file = event.target.files?.[0];
    if(!file) return;
    try{
      fLogo.value = await readFileAsDataURL(file);
      updateLogoPreview();
    }catch(error){
      alert(error.message || '图片读取失败');
    } finally {
      logoFileInput.value = '';
    }
  });

  setPerspectiveMode('none');
  syncSelectAllLabel();
  syncClearSearchButton();
  setTimeDisplayMode('range');
  setNodeDisplayMode('both');
  loadData();
</script>

<script type="text/babel">
    const { useState, useCallback, useEffect, useMemo, useDeferredValue, useRef, useContext } = React;
  const DISPLAY_OPTIONS_STORAGE_KEY = 'awesome-canvas-display-options';
  const DEFAULT_DISPLAY_OPTIONS = {
    showCardChrome: true,
    autoRelayoutOnTagFilter: false,
    showTitle: true,
    showImage: true,
    showRemarks: true,
    showTags: true,
    showHandles: true,
    showEdges: true
  };
  const DisplayOptionsContext = React.createContext(DEFAULT_DISPLAY_OPTIONS);
  const AvailableTagsContext = React.createContext([]);

  const getRF = () => {
    const RF = window.ReactFlow || {};
    const components = RF.ReactFlow || RF.default || RF;
    return {
      ReactFlow: components,
      Handle: RF.Handle || components.Handle,
      Position: RF.Position || components.Position || { Top: 'top', Bottom: 'bottom', Left: 'left', Right: 'right' },
      Background: RF.Background || components.Background,
      Controls: RF.Controls || components.Controls,
      MiniMap: RF.MiniMap || components.MiniMap,
      useNodesState: RF.useNodesState || components.useNodesState,
      useEdgesState: RF.useEdgesState || components.useEdgesState,
      addEdge: RF.addEdge || components.addEdge
    };
  };

  const AssetBlock = ({ id, data, selected }) => {
    const { Handle, Position } = getRF();
    const displayOptions = useContext(DisplayOptionsContext);
    const availableTags = useContext(AvailableTagsContext);
    const pureImageMode = !displayOptions.showCardChrome;
    const [isExpanded, setIsExpanded] = useState(false);
    const [isEditing, setIsEditing] = useState(false);
    const [selectedEditQuickTags, setSelectedEditQuickTags] = useState([]);
    const [editData, setEditData] = useState({ 
      remarks: data.remarks || '', 
      tags: (data.tags || []).join(', '),
      title: data.title || '' 
    });
    
    useEffect(() => { 
      if (window.lucide) window.lucide.createIcons(); 
      setEditData({
        remarks: data.remarks || '',
        tags: (data.tags || []).join(', '),
        title: data.title || ''
      });
      setSelectedEditQuickTags([]);
    }, [isExpanded, isEditing, data.tags, data.remarks, data.title, displayOptions.showCardChrome, displayOptions.showTitle]);

    const isImage = data.filename && (
      data.filename.toLowerCase().endsWith('.svg') || 
      data.filename.match(/\.(jpg|jpeg|png|gif|webp)$/i)
    );

    const handleSave = () => {
      const manualTags = editData.tags.split(/[,，]/).map(s => s.trim()).filter(Boolean);
      const updatedTags = [...new Set([...manualTags, ...selectedEditQuickTags])];
      data.onUpdate(id, { 
        ...data, 
        remarks: editData.remarks, 
        tags: updatedTags,
        title: editData.title 
      });
      setSelectedEditQuickTags([]);
      setIsEditing(false);
    };

    const toggleEditQuickTag = (tag) => {
      setSelectedEditQuickTags(prev =>
        prev.includes(tag)
          ? prev.filter(item => item !== tag)
          : [...prev, tag]
      );
    };

    if (!Handle) return <div className="p-4 bg-red-50 text-red-500">Handle Component Missing</div>;

    return (
      <div className={`${pureImageMode ? 'inline-block bg-transparent border-0 shadow-none ring-0 rounded-none w-auto overflow-visible' : `bg-white rounded-xl shadow-xl border-2 ${selected ? "border-blue-500 ring-4 ring-blue-500/20" : "border-gray-100"} overflow-visible transition-all duration-300 w-72`} relative`}>
        {displayOptions.showHandles && (
          <>
            <Handle type="target" position={Position.Top} className="w-3 h-3 bg-blue-400 border-2 border-white" />
            <Handle type="source" position={Position.Bottom} className="w-3 h-3 bg-blue-400 border-2 border-white" />
            <Handle type="source" position={Position.Right} className="w-3 h-3 bg-blue-400 border-2 border-white" />
            <Handle type="target" position={Position.Left} className="w-3 h-3 bg-blue-400 border-2 border-white" />
          </>
        )}
        {!pureImageMode && !displayOptions.showTitle && (
          <button
            onClick={(e) => { e.stopPropagation(); setIsExpanded(!isExpanded); }}
            className="absolute right-3 top-3 z-10 rounded-md bg-white/92 p-1.5 shadow-sm backdrop-blur hover:bg-white"
          >
            <i data-lucide={isExpanded ? "chevron-up" : "chevron-down"} className="w-4 h-4 text-gray-600"></i>
          </button>
        )}

        <div className={`${pureImageMode ? 'overflow-visible rounded-none bg-transparent' : 'overflow-hidden rounded-xl bg-white'}`}>
          {!pureImageMode && displayOptions.showTitle ? (
            <div className="p-3 flex justify-between items-center bg-gray-50 border-b border-gray-100">
              <div className="min-w-0 flex-1">
                {isEditing ? (
                  <input 
                    className="text-sm font-bold bg-white border border-blue-300 rounded px-1 w-40 max-w-full"
                    value={editData.title}
                    onChange={e => setEditData({...editData, title: e.target.value})}
                    onClick={e => e.stopPropagation()}
                  />
                ) : (
                  <span className="block text-sm font-bold truncate text-gray-800">{data.title || data.filename}</span>
                )}
              </div>
              <button onClick={(e) => { e.stopPropagation(); setIsExpanded(!isExpanded); }} className="p-1 hover:bg-gray-200 rounded-md">
                <i data-lucide={isExpanded ? "chevron-up" : "chevron-down"} className="w-4 h-4 text-gray-500"></i>
              </button>
            </div>
          ) : null}

          {displayOptions.showImage && (
            <div
              className={`relative flex items-center justify-center overflow-hidden ${pureImageMode ? 'bg-transparent' : 'bg-gray-100'}`}
              style={pureImageMode ? undefined : { height: '160px' }}
            >
              {isImage ? (
                <img
                  src={`./assets/image/${data.filename}`}
                  className={pureImageMode ? 'block max-w-[320px] max-h-[240px] w-auto h-auto object-contain p-0' : 'w-full h-full object-contain p-2'}
                  alt={data.title}
                  loading="lazy"
                  decoding="async"
                />
              ) : (
                <div className="flex flex-col items-center text-gray-400">
                   <i data-lucide="file-text" className="w-12 h-12 mb-2"></i>
                   <span className="text-[10px]">{data.filename}</span>
                </div>
              )}
            </div>
          )}

          {isExpanded && !pureImageMode && (
            <div className={`p-4 space-y-3 bg-white animate-in slide-in-from-top-1 duration-200 ${displayOptions.showImage || displayOptions.showTitle ? 'border-t border-gray-100' : ''}`}>
              {(displayOptions.showRemarks || isEditing) && (
                <div>
                  <label className="text-[10px] uppercase tracking-wider font-bold text-gray-400 mb-1 block">备注</label>
                  {isEditing ? (
                    <textarea 
                      className="w-full text-xs text-gray-600 border border-blue-300 rounded p-1 min-h-[60px]"
                      value={editData.remarks}
                      onChange={e => setEditData({...editData, remarks: e.target.value})}
                      onClick={e => e.stopPropagation()}
                    />
                  ) : (
                    <p className="text-xs text-gray-600 leading-relaxed italic border-l-2 border-blue-200 pl-2">
                      {data.remarks || "暂无备注..."}
                    </p>
                  )}
                </div>
              )}
              {(displayOptions.showTags || isEditing) && (
                <div>
                  <label className="text-[10px] uppercase tracking-wider font-bold text-gray-400 mb-1 block">标签</label>
                  {isEditing ? (
                    <div className="space-y-2">
                      <input 
                        className="w-full text-xs text-blue-600 border border-blue-300 rounded p-1"
                        placeholder="标签以逗号分隔"
                        value={editData.tags}
                        onChange={e => setEditData({...editData, tags: e.target.value})}
                        onClick={e => e.stopPropagation()}
                      />
                      {availableTags.length > 0 && (
                        <div className="space-y-1.5">
                          <div className="text-[10px] font-bold uppercase tracking-[0.24em] text-gray-400">已有标签</div>
                          <div className="flex flex-wrap gap-1.5">
                            {availableTags.map(tag => (
                              <button
                                key={tag}
                                type="button"
                                onClick={(e) => { e.stopPropagation(); toggleEditQuickTag(tag); }}
                                className={`px-2 py-0.5 rounded-md text-[10px] font-bold transition-all ${
                                  selectedEditQuickTags.includes(tag)
                                    ? 'bg-blue-600 text-white shadow-sm'
                                    : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                }`}
                              >
                                #{tag}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div className="flex flex-wrap gap-1">
                      {(data.tags || []).length > 0 ? (data.tags || []).map(tag => (
                        <span key={tag} className="px-2 py-0.5 bg-blue-50 text-blue-600 text-[10px] font-bold rounded-md">#{tag}</span>
                      )) : <span className="text-[10px] text-gray-300">无标签</span>}
                    </div>
                  )}
                </div>
              )}
              <div className="pt-2 flex gap-2">
                {isEditing ? (
                  <>
                    <button onClick={handleSave} className="flex-1 px-3 py-1.5 bg-blue-600 text-white text-[10px] font-medium rounded-lg hover:bg-blue-700 transition-colors">确认</button>
                    <button onClick={() => { setSelectedEditQuickTags([]); setIsEditing(false); }} className="px-3 py-1.5 border border-gray-200 text-gray-600 text-[10px] font-medium rounded-lg hover:bg-gray-50 transition-colors">取消</button>
                  </>
                ) : (
                  <>
                    <button onClick={() => { setIsEditing(true); setIsExpanded(true); }} className="flex-1 px-3 py-1.5 bg-gray-900 text-white text-[10px] font-medium rounded-lg hover:bg-gray-800 transition-colors">编辑</button>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  };
  const MemoAssetBlock = React.memo(AssetBlock);
  const STABLE_NODE_TYPES = {
    assetBlock: MemoAssetBlock
  };

  const HoverSidePanel = ({ top = 16, width = 320, label, icon, children }) => {
    const [open, setOpen] = useState(false);
    const closeTimerRef = useRef(null);

    const openPanel = () => {
      if (closeTimerRef.current) {
        clearTimeout(closeTimerRef.current);
      }
      setOpen(true);
    };

    const closePanelSoon = () => {
      if (closeTimerRef.current) {
        clearTimeout(closeTimerRef.current);
      }
      closeTimerRef.current = setTimeout(() => {
        setOpen(false);
      }, 120);
    };

    useEffect(() => {
      return () => {
        if (closeTimerRef.current) {
          clearTimeout(closeTimerRef.current);
        }
      };
    }, []);

    return (
      <div className="absolute left-4 z-50 pointer-events-none" style={{ top: `${top}px` }}>
        <button
          type="button"
          className="pointer-events-auto flex items-center gap-2 rounded-2xl border border-gray-200 bg-white/95 px-3 py-2 shadow-xl backdrop-blur-md whitespace-nowrap"
          onMouseEnter={openPanel}
          onMouseLeave={closePanelSoon}
        >
          <i data-lucide={icon} className="w-4 h-4 text-gray-500"></i>
          <span className="text-[11px] font-bold uppercase tracking-[0.24em] text-gray-500 whitespace-nowrap">{label}</span>
        </button>
        {open && (
          <div
            className="pointer-events-auto absolute left-0 top-0 ml-[116px] max-w-[78vw] rounded-3xl border border-gray-200 bg-white/95 shadow-2xl backdrop-blur-xl overflow-hidden"
            style={{ width: `${width}px` }}
            onMouseEnter={openPanel}
            onMouseLeave={closePanelSoon}
          >
            <div className="flex min-h-[56px] items-center gap-2 border-b border-gray-100 px-4 py-3">
              <i data-lucide={icon} className="w-4 h-4 text-gray-500"></i>
              <span className="text-[11px] font-bold uppercase tracking-[0.24em] text-gray-500 whitespace-nowrap">{label}</span>
            </div>
            <div className="p-4">
              {children}
            </div>
          </div>
        )}
      </div>
    );
  };

  const AwesomeCanvas = () => {
    const rfObj = getRF();
    const { ReactFlow, Background, Controls, MiniMap, useNodesState, useEdgesState, addEdge } = rfObj;

    const [nodes, setNodes, onNodesChange] = useNodesState([]);
    const [edges, setEdges, onEdgesChange] = useEdgesState([]);
    const [status, setStatus] = useState('Loading...');
    const [isSaving, setIsSaving] = useState(false);
    const [batchTags, setBatchTags] = useState('');
    const [selectedBatchQuickTags, setSelectedBatchQuickTags] = useState([]);
    const [nodesPerRow, setNodesPerRow] = useState(6);
    const [nodeSpacing, setNodeSpacing] = useState({ x: 350, y: 450 });
    const [selectedTags, setSelectedTags] = useState([]);
    const [searchTerm, setSearchTerm] = useState('');
    const [saveNotice, setSaveNotice] = useState({ kind: 'idle', text: '' });
    const [displayOptions, setDisplayOptions] = useState(() => {
      try {
        const saved = localStorage.getItem(DISPLAY_OPTIONS_STORAGE_KEY);
        return saved ? { ...DEFAULT_DISPLAY_OPTIONS, ...JSON.parse(saved) } : DEFAULT_DISPLAY_OPTIONS;
      } catch (error) {
        return DEFAULT_DISPLAY_OPTIONS;
      }
    });
    const deferredSearchTerm = useDeferredValue(searchTerm);
    const hasLoadedRef = useRef(false);
    const saveTimerRef = useRef(null);
    const saveNoticeTimerRef = useRef(null);

    // Extract all unique tags from nodes
    const allTags = useMemo(() => {
      const tagSet = new Set();
      nodes.forEach(node => {
        if (node.data && node.data.tags && Array.isArray(node.data.tags)) {
          node.data.tags.forEach(tag => tagSet.add(tag));
        }
      });
      return Array.from(tagSet).sort();
    }, [nodes]);

    // Filter nodes based on selected tags
    const filteredNodes = useMemo(() => {
      const normalizedSearch = deferredSearchTerm.trim().toLowerCase();
      return nodes.filter(node => {
        if (!node.data) return false;
        const matchesTag = selectedTags.length === 0 || (
          Array.isArray(node.data.tags) && selectedTags.some(tag => node.data.tags.includes(tag))
        );
        if (!matchesTag) return false;
        if (!normalizedSearch) return true;
        const haystack = [
          node.data.title || '',
          node.data.filename || '',
          node.data.remarks || '',
          ...(Array.isArray(node.data.tags) ? node.data.tags : [])
        ].join(' ').toLowerCase();
        return haystack.includes(normalizedSearch);
      });
    }, [nodes, selectedTags, deferredSearchTerm]);

    const displayedNodes = useMemo(() => {
      if (!displayOptions.autoRelayoutOnTagFilter || selectedTags.length === 0) {
        return filteredNodes;
      }
      return filteredNodes.map((node, i) => ({
        ...node,
        position: {
          x: (i % nodesPerRow) * nodeSpacing.x + 100,
          y: Math.floor(i / nodesPerRow) * nodeSpacing.y + 100
        }
      }));
    }, [filteredNodes, displayOptions.autoRelayoutOnTagFilter, selectedTags.length, nodesPerRow, nodeSpacing.x, nodeSpacing.y]);

    const toggleTag = (tag) => {
      setSelectedTags(prev => 
        prev.includes(tag) 
          ? prev.filter(t => t !== tag)
          : [...prev, tag]
      );
    };

    const clearTagFilter = () => setSelectedTags([]);

    const toggleDisplayOption = (key) => {
      setDisplayOptions(prev => ({ ...prev, [key]: !prev[key] }));
    };

    const applyDisplayPreset = (preset) => {
      if (preset === 'image-only') {
        setDisplayOptions(prev => ({
          ...prev,
          showCardChrome: false,
          showTitle: false,
          showImage: true,
          showRemarks: false,
          showTags: false,
          showHandles: false,
          showEdges: false
        }));
        return;
      }
      if (preset === 'image-title') {
        setDisplayOptions(prev => ({
          ...prev,
          showCardChrome: true,
          showTitle: true,
          showImage: true,
          showRemarks: false,
          showTags: false,
          showHandles: true,
          showEdges: true
        }));
      }
    };

    const resetDisplayOptions = () => {
      setDisplayOptions(DEFAULT_DISPLAY_OPTIONS);
    };

    const toggleBatchQuickTag = (tag) => {
      setSelectedBatchQuickTags(prev =>
        prev.includes(tag)
          ? prev.filter(item => item !== tag)
          : [...prev, tag]
      );
    };

    const onNodeUpdate = useCallback((nodeId, newData) => {
      setNodes(nds => nds.map(node => {
        if (node.id === nodeId) {
          return { ...node, data: { ...node.data, ...newData } };
        }
        return node;
      }));
    }, [setNodes]);

    const relayout = useCallback((currentNodesPerRow, spacing) => {
      setNodes(nds => nds.map((node, i) => ({
        ...node,
        position: { 
          x: (i % currentNodesPerRow) * spacing.x + 100, 
          y: Math.floor(i / currentNodesPerRow) * spacing.y + 100 
        }
      })));
    }, [setNodes]);

    useEffect(() => {
      fetch("./assets/image_data.json")
        .then(res => res.json())
        .then(data => {
          if (data && data.images) {
            setNodes(data.images.map((img, i) => ({
              id: String(img.id),
              type: 'assetBlock',
              position: { 
                x: (i % nodesPerRow) * nodeSpacing.x + 100, 
                y: Math.floor(i / nodesPerRow) * nodeSpacing.y + 100 
              },
              data: { ...img, onUpdate: onNodeUpdate },
            })));
            setStatus('Ready');
            hasLoadedRef.current = true;
          }
          setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 500);
        })
        .catch(err => setStatus('Error: ' + err.message));
    }, [onNodeUpdate]); 

    const selectedNodes = displayedNodes.filter(n => n.selected);

    const handleBatchTags = () => {
      const manualTags = batchTags.split(/[,，]/).map(s => s.trim()).filter(Boolean);
      const newTags = [...new Set([...manualTags, ...selectedBatchQuickTags])];
      if (!newTags.length) return;
      setNodes(nds => nds.map(node => {
        if (node.selected) {
          const existingTags = node.data.tags || [];
          const combinedTags = [...new Set([...existingTags, ...newTags])];
          return { ...node, data: { ...node.data, tags: combinedTags } };
        }
        return node;
      }));
      setBatchTags('');
      setSelectedBatchQuickTags([]);
    };

    const handleBatchClearTags = () => {
      if (!confirm(`确定要清空选中的 ${selectedNodes.length} 个节点的标签吗？`)) return;
      setNodes(nds => nds.map(node => {
        if (node.selected) return { ...node, data: { ...node.data, tags: [] } };
        return node;
      }));
      setSelectedBatchQuickTags([]);
    };

    const saveAllData = async () => {
      setIsSaving(true);
      setSaveNotice({ kind: 'saving', text: '自动保存中...' });
      const images = nodes.map(n => {
        const { onUpdate, ...cleanData } = n.data;
        return cleanData;
      });
      try {
        const res = await fetch('/save-assets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ images })
        });
        const result = await res.json();
        if (!res.ok || !result.ok) {
          throw new Error(result.error || res.statusText);
        }
        setSaveNotice({ kind: 'success', text: '已自动保存' });
        if (saveNoticeTimerRef.current) {
          clearTimeout(saveNoticeTimerRef.current);
        }
        saveNoticeTimerRef.current = setTimeout(() => {
          setSaveNotice({ kind: 'idle', text: '' });
        }, 1400);
      } catch (e) {
        console.error('自动保存失败:', e);
        setSaveNotice({ kind: 'error', text: `保存失败：${e.message}` });
      }
      setIsSaving(false);
    };

    useEffect(() => {
      if (!hasLoadedRef.current || nodes.length === 0) return;
      if (saveTimerRef.current) {
        clearTimeout(saveTimerRef.current);
      }
      saveTimerRef.current = setTimeout(() => {
        saveAllData();
      }, 600);
      return () => {
        if (saveTimerRef.current) {
          clearTimeout(saveTimerRef.current);
        }
      };
    }, [nodes]);

    useEffect(() => {
      return () => {
        if (saveTimerRef.current) {
          clearTimeout(saveTimerRef.current);
        }
        if (saveNoticeTimerRef.current) {
          clearTimeout(saveNoticeTimerRef.current);
        }
      };
    }, []);

    useEffect(() => {
      try {
        localStorage.setItem(DISPLAY_OPTIONS_STORAGE_KEY, JSON.stringify(displayOptions));
      } catch (error) {
        console.warn('保存画布显示设置失败:', error);
      }
    }, [displayOptions]);

    const onConnect = useCallback((params) => setEdges((eds) => addEdge(params, eds)), [setEdges, addEdge]);

    if (status.startsWith('Loading')) return (
      <div className="flex flex-col items-center justify-center h-full w-full bg-gray-50">
        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <p className="text-gray-500 font-medium italic">正在渲染灵感画布...</p>
      </div>
    );

    if (!ReactFlow) return <div className="p-8 text-red-500 text-center font-bold">ReactFlow 库加载失败，请刷新页面。</div>;

    return (
      <div style={{ width: '100%', height: '100%', position: 'absolute', inset: 0 }}>
        <div className="absolute inset-x-0 top-0 z-50 pointer-events-none">
          <HoverSidePanel label="排版设置" icon="sliders-horizontal" top={16} width={360}>
            <div className="space-y-4">
              <div className="flex items-center gap-3">
                <span className="w-16 text-[10px] font-bold uppercase tracking-[0.24em] text-gray-400">每行数量</span>
                <input type="range" min="2" max="15" value={nodesPerRow} onChange={e => setNodesPerRow(parseInt(e.target.value))} className="flex-1 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                <span className="w-8 text-right text-sm font-bold text-blue-600">{nodesPerRow}</span>
              </div>
              <div className="flex items-center gap-3">
                <span className="w-16 text-[10px] font-bold uppercase tracking-[0.24em] text-gray-400">横向间距</span>
                <input type="range" min="200" max="600" step="10" value={nodeSpacing.x} onChange={e => setNodeSpacing({...nodeSpacing, x: parseInt(e.target.value)})} className="flex-1 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                <span className="w-10 text-right text-xs font-medium text-gray-600">{nodeSpacing.x}</span>
              </div>
              <div className="flex items-center gap-3">
                <span className="w-16 text-[10px] font-bold uppercase tracking-[0.24em] text-gray-400">纵向间距</span>
                <input type="range" min="200" max="800" step="10" value={nodeSpacing.y} onChange={e => setNodeSpacing({...nodeSpacing, y: parseInt(e.target.value)})} className="flex-1 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                <span className="w-10 text-right text-xs font-medium text-gray-600">{nodeSpacing.y}</span>
              </div>
              <button onClick={() => relayout(nodesPerRow, nodeSpacing)} className="w-full bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-bold px-4 py-2.5 rounded-2xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                <i data-lucide="layout-grid" className="w-4 h-4"></i> 重新排版
              </button>
              <div className="space-y-2 border-t border-gray-100 pt-4">
                <div className="text-[10px] font-bold uppercase tracking-[0.24em] text-gray-400">快捷预设</div>
                <div className="grid grid-cols-2 gap-2">
                  <button
                    type="button"
                    onClick={() => applyDisplayPreset('image-only')}
                    className="rounded-2xl border border-gray-200 bg-white px-3 py-2 text-xs font-medium text-gray-700 transition-all hover:bg-gray-50"
                  >
                    纯图
                  </button>
                  <button
                    type="button"
                    onClick={() => applyDisplayPreset('image-title')}
                    className="rounded-2xl border border-gray-200 bg-white px-3 py-2 text-xs font-medium text-gray-700 transition-all hover:bg-gray-50"
                  >
                    图+标题
                  </button>
                </div>
              </div>
              <div className="space-y-2 border-t border-gray-100 pt-4">
                <div className="flex items-center justify-between gap-3">
                  <div className="text-[10px] font-bold uppercase tracking-[0.24em] text-gray-400">显示选项</div>
                  <button
                    type="button"
                    onClick={resetDisplayOptions}
                    className="text-[11px] font-medium text-gray-400 transition-colors hover:text-blue-600"
                  >
                    恢复默认
                  </button>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  {[
                    ['showCardChrome', '卡片容器'],
                    ['showTitle', '节点标题'],
                    ['showImage', '节点图片'],
                    ['showRemarks', '节点备注'],
                    ['showTags', '节点标签'],
                    ['showHandles', '连接锚点'],
                    ['showEdges', '连线']
                  ].map(([key, label]) => (
                    <button
                      key={key}
                      type="button"
                      onClick={() => toggleDisplayOption(key)}
                      className={`rounded-2xl border px-3 py-2 text-xs font-medium transition-all ${
                        displayOptions[key]
                          ? 'border-blue-200 bg-blue-50 text-blue-700 shadow-sm'
                          : 'border-gray-200 bg-white text-gray-500 hover:bg-gray-50'
                      }`}
                    >
                      {label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </HoverSidePanel>

          <HoverSidePanel label="标签筛选" icon="tags" top={88} width={360}>
            <div className="space-y-3">
              <div className="flex items-center justify-between gap-3">
                <span className="text-[10px] font-bold uppercase tracking-[0.24em] text-gray-400">已显示 {displayedNodes.length} / {nodes.length}</span>
                {selectedTags.length > 0 && (
                  <button onClick={clearTagFilter} className="text-xs text-gray-400 hover:text-red-500 transition-colors">
                    清除
                  </button>
                )}
              </div>
              <button
                type="button"
                onClick={() => toggleDisplayOption('autoRelayoutOnTagFilter')}
                className={`flex w-full items-center justify-between rounded-2xl border px-3 py-2 text-xs font-medium transition-all ${
                  displayOptions.autoRelayoutOnTagFilter
                    ? 'border-blue-200 bg-blue-50 text-blue-700 shadow-sm'
                    : 'border-gray-200 bg-white text-gray-500 hover:bg-gray-50'
                }`}
              >
                <span>标签筛选补位</span>
                <span>{displayOptions.autoRelayoutOnTagFilter ? '开启' : '关闭'}</span>
              </button>
              {allTags.length > 0 ? (
                <div className="flex max-h-64 flex-wrap gap-2 overflow-y-auto pr-1">
                  {allTags.map(tag => (
                    <button
                      key={tag}
                      onClick={() => toggleTag(tag)}
                      className={`px-2.5 py-1 rounded-full text-xs font-medium transition-all whitespace-nowrap ${
                        selectedTags.includes(tag)
                          ? 'bg-blue-600 text-white shadow-md'
                          : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                      }`}
                    >
                      {tag}
                    </button>
                  ))}
                </div>
              ) : (
                <p className="text-xs text-gray-400">还没有可筛选的标签</p>
              )}
            </div>
          </HoverSidePanel>

          <HoverSidePanel label="搜索" icon="search" top={160} width={340}>
            <div className="space-y-3">
              <div className="rounded-2xl border border-gray-200 bg-gray-50/80 px-3 py-2">
                <input
                  className="w-full bg-transparent text-sm text-gray-700 outline-none placeholder:text-gray-400"
                  placeholder="搜索标题、文件名、备注、标签"
                  value={searchTerm}
                  onChange={e => setSearchTerm(e.target.value)}
                />
              </div>
              <div className="text-[11px] text-gray-400">
                当前结果 {displayedNodes.length} 个节点
              </div>
            </div>
          </HoverSidePanel>

          <div className="absolute left-1/2 top-4 -translate-x-1/2 flex flex-col items-center gap-2 pointer-events-none">
          {selectedNodes.length > 1 && (
            <div className="max-w-[720px] bg-white/90 backdrop-blur-md px-4 py-3 rounded-2xl shadow-2xl border border-blue-100 animate-in slide-in-from-top-4 duration-300 pointer-events-auto">
              <div className="flex items-center gap-2">
                <span className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">已选 {selectedNodes.length}</span>
                <input className="text-xs border border-gray-200 rounded-lg px-3 py-1.5 w-48 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="批量添加标签" value={batchTags} onChange={e => setBatchTags(e.target.value)} />
                <button onClick={handleBatchTags} className="bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-blue-700 transition-all">应用</button>
                <button onClick={handleBatchClearTags} className="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-red-50 hover:text-red-600 transition-all">清空标签</button>
              </div>
              {allTags.length > 0 && (
                <div className="mt-3 flex items-start gap-2">
                  <span className="pt-1 text-[10px] font-bold uppercase tracking-[0.24em] text-gray-400 whitespace-nowrap">已有标签</span>
                  <div className="flex flex-wrap gap-2">
                    {allTags.map(tag => (
                      <button
                        key={tag}
                        onClick={() => toggleBatchQuickTag(tag)}
                        className={`px-2.5 py-1 rounded-full text-xs font-medium transition-all whitespace-nowrap ${
                          selectedBatchQuickTags.includes(tag)
                            ? 'bg-blue-600 text-white shadow-md'
                            : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        }`}
                      >
                        {tag}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
          </div>
        </div>
        {saveNotice.text && (
          <div className="absolute bottom-4 right-4 z-50 pointer-events-none">
            <div className={`rounded-2xl border px-4 py-2 text-xs font-medium shadow-xl backdrop-blur-md ${
              saveNotice.kind === 'error'
                ? 'border-red-200 bg-red-50/95 text-red-600'
                : saveNotice.kind === 'success'
                  ? 'border-emerald-200 bg-emerald-50/95 text-emerald-700'
                  : 'border-gray-200 bg-white/92 text-gray-600'
            }`}>
              {saveNotice.text}
            </div>
          </div>
        )}
        <DisplayOptionsContext.Provider value={displayOptions}>
          <AvailableTagsContext.Provider value={allTags}>
            <ReactFlow
              nodes={displayedNodes}
              edges={displayOptions.showEdges ? edges : []}
              onNodesChange={onNodesChange}
              onEdgesChange={onEdgesChange}
              onConnect={onConnect}
              nodeTypes={STABLE_NODE_TYPES}
              onlyRenderVisibleElements
              fitView
              style={{ background: '#f8fafc' }}
            >
              <Background variant="dots" gap={24} size={1} color="#e2e8f0" />
              <Controls />
              <MiniMap 
                style={{ backgroundColor: 'rgba(255, 255, 255, 0.7)', backdropFilter: 'blur(8px)', border: '1px solid #e2e8f0', borderRadius: '12px' }}
                nodeColor="#3b82f6" maskColor="rgba(241, 245, 249, 0.6)" pannable zoomable
              />
            </ReactFlow>
          </AvailableTagsContext.Provider>
        </DisplayOptionsContext.Provider>
      </div>
    );
  };

  const mount = () => {
    const el = document.getElementById('awesome-root');
    if (el) {
      const root = ReactDOM.createRoot(el);
      root.render(<AwesomeCanvas />);
    }
  };

  if (document.readyState === 'complete') mount();
  else window.addEventListener('load', mount);
</script>
</body>
</html>
